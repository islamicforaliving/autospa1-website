<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- 3D effect filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Gradient for red letters -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for blue bar -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background shape (shield/badge style from original) -->
  <path d="M 40 20 L 360 20 L 380 50 L 360 100 L 200 115 L 40 100 L 20 50 Z" 
        fill="#1a1a2e" stroke="#444" stroke-width="2"/>
  
  <!-- Top accent line -->
  <path d="M 50 25 L 350 25" stroke="#4488ff" stroke-width="3" opacity="0.8"/>
  
  <!-- AUTO SPA 1 text -->
  <text x="200" y="65" 
        font-family="Arial Black, Impact, sans-serif" 
        font-size="42" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#redGradient)"
        filter="url(#shadow)"
        style="letter-spacing: 2px;">AUTO SPA 1</text>
  
  <!-- Blue info bar -->
  <rect x="60" y="75" width="280" height="22" rx="3" fill="url(#blueGradient)"/>
  
  <!-- Phone number -->
  <text x="75" y="91" 
        font-family="Arial, sans-serif" 
        font-size="12" 
        font-weight="bold"
        fill="white">734-352-9000</text>
  
  <!-- Divider -->
  <line x1="165" y1="78" x2="165" y2="94" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Service text -->
  <text x="175" y="91" 
        font-family="Arial, sans-serif" 
        font-size="12" 
        font-weight="bold"
        fill="white">WINDOW TINTING • DETAILING</text>
</svg>