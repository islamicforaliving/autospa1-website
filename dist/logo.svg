<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <!-- 3D shadow effect -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    
    <!-- Bright metallic red gradient -->
    <linearGradient id="redMetallic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6666;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#ff2222;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#ee0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Brighter shine -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- AUTO text -->
  <text x="75" y="58" 
        font-family="Arial Black, Helvetica Neue, sans-serif" 
        font-size="46" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#redMetallic)"
        filter="url(#shadow)"
        style="letter-spacing: 2px;">AUTO</text>
  
  <!-- SPA text -->
  <text x="220" y="58" 
        font-family="Arial Black, Helvetica Neue, sans-serif" 
        font-size="46" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#redMetallic)"
        filter="url(#shadow)"
        style="letter-spacing: 2px;">SPA</text>
  
  <!-- 1 with special styling -->
  <text x="295" y="60" 
        font-family="Arial Black, Helvetica Neue, sans-serif" 
        font-size="50" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#redMetallic)"
        filter="url(#shadow)">1</text>
  
  <!-- Shine overlay -->
  <text x="75" y="58" 
        font-family="Arial Black, Helvetica Neue, sans-serif" 
        font-size="46" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#shine)"
        style="letter-spacing: 2px;">AUTO</text>
  
  <text x="220" y="58" 
        font-family="Arial Black, Helvetica Neue, sans-serif" 
        font-size="46" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#shine)"
        style="letter-spacing: 2px;">SPA</text>
  
  <text x="295" y="60" 
        font-family="Arial Black, Helvetica Neue, sans-serif" 
        font-size="50" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#shine)">1</text>
</svg>