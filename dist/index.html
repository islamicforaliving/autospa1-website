<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Protected</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        .lock-icon {
            font-size: 48px;
            margin-bottom: 24px;
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="password"]:focus {
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.08);
        }
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="lock-icon">🔒</div>
        <h1>Password Protected</h1>
        <p>Please enter the password to access this site</p>
        <form id="passwordForm">
            <div class="input-group">
                <input type="password" id="password" placeholder="Enter password" autocomplete="off">
            </div>
            <button type="submit">Enter Site</button>
        </form>
        <div class="error" id="error">Incorrect password. Please try again.</div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'gusauto';
        
        // Check if already authenticated
        if (sessionStorage.getItem('siteAuth') === 'true') {
            window.location.href = 'main.html';
        }

        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('password').value;
            const error = document.getElementById('error');
            
            if (input === CORRECT_PASSWORD) {
                sessionStorage.setItem('siteAuth', 'true');
                window.location.href = 'main.html';
            } else {
                error.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // Allow Enter key
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('passwordForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
